<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Hoài Âm - Sản phẩm</title>

	<link rel="icon" href="/assets/imgs/favicon.png">
	<link rel="stylesheet" href="/assets/css/main.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

	<style>
		main {
			display: flex;
			flex-direction: column;
			gap: 10px;
		}

		.product-search {
			display: flex;
			gap: 10px;
		}

		#product-filter-toggle, #search-box {
			padding: 10px;
			border: 1px solid var(--theme-color-3);
			border-radius: 5px;
			background-color: transparent;
		}

		#product-filter-toggle {
			background-color: var(--theme-color-1);
			color: var(--theme-color-4);
			border: none;
			transition: background-color 0.25s ease,
				color 0.25s ease,
				filter 0.25s ease;
		}

		#product-filter-toggle:hover {
			filter: brightness(0.9);
		}

		#product-filter-toggle.active {
			background-color: var(--theme-color-4);
			color: var(--theme-color-1);
		}

		#product-filter-toggle.active:hover {
			filter: brightness(2);
		}

		#product-filter-toggle {
			border: none;
		}

		#search-box {
			flex: 1;
			outline-color: var(--theme-color-4);
		}

		#product-filter {
			background-color: var(--theme-color-2);
			padding: 15px;
			border-radius: 5px;
		}

		#product-filter h2 {
			margin: 0;
		}

		#product-filter select {
			width: 100%;
			border: 10px solid transparent;
			outline: 1px solid var(--theme-color-3);
			border-radius: 5px;
		}

		@media (min-width: 1350px) {
			main {
				width: 1000px;
				margin: auto;
			}
		}
	</style>
</head>

<body>
	<header>
		<button class="fa-solid fa-bars-staggered" id="nav-toggle"></button>
		<a href="/trangchu.html"><img src="assets/imgs/logo-dark.png" height="40px"></a>
		<nav id="nav-bar">
			<ul>
				<li><a href="/trangchu.html"><i class="fa-solid fa-house"></i>Trang chủ</a></li>
				<li><a href="/gioithieu.html"><i class="fa-solid fa-circle-info"></i>Giới thiệu</a></li>
				<li><a href="/sanpham.html"><i class="fa-solid fa-bag-shopping"></i>Sản phẩm</a></li>
				<li><a href="/giohang.html"><i class="fa-solid fa-cart-shopping"></i>Giỏ hàng</a></li>
				<li><a href="/dangnhap.html"><i class="fa-solid fa-arrow-right-to-bracket"></i>Đăng nhập</a></li>
				<li><a href="/dangky.html"><i class="fa-solid fa-user-plus"></i>Đăng ký</a></li>
				<li><a href="/lienhe.html"><i class="fa-solid fa-envelope"></i>Liên hệ</a></li>
			</ul>
		</nav>
	</header>

	<main>
		<div class="product-search">
			<button id="product-filter-toggle"><i class="fa-solid fa-filter"></i></button>
			<input id="search-box" type="text" placeholder="Tìm kiếm sản phẩm">
		</div>

		<div id="product-filter" style="display: none;">
			<h2>Bộ lọc</h2>

			<div id="type-filter">
				<p>Loại sản phẩm</p>
			</div>

			<div>
				<p>Sắp xếp theo</p>
				<select id="filter-sort">
					<option value="name">Tên</option>
					<option value="price-down">Giá từ cao đến thấp</option>
					<option value="price-up">Giá từ thấp đến cao</option>
				</select>
			</div>
		</div>

		<div id="product-list">
		</div>
	</main>

	<footer>
		<p>Sản phẩm của nhóm 8 CT18805</p>
	</footer>

	<script src="assets/js/main.js"></script>
	<script>
		let filterToggleState = false;

		const filterToggle = document.getElementById("product-filter-toggle");
		const filterContainer = document.getElementById("product-filter");

		filterToggle.addEventListener("click", () => {
			filterToggleState = !filterToggleState;

			if (filterToggleState) {
				filterToggle.classList.add("active");
				filterContainer.style.removeProperty("display");
			} else {
				filterToggle.classList.remove("active");
				filterContainer.style.display = "none";
			}
		});

		const typeCheckboxes = {};
		const searchBox = document.getElementById("search-box");
		const typeFilter = document.getElementById("type-filter");
		const filterSort = document.getElementById("filter-sort");

		function renderProductList() {
			console.log(searchBox.value);
			console.log(filterSort.value);

			for (const [a, b] of Object.entries(typeCheckboxes)) {
				console.log(a, b.checked);
			}
		}

		searchBox.addEventListener("input", renderProductList);
		filterSort.addEventListener("change", renderProductList);

		for (const [id, data] of Object.entries(productData)) {
			if (!typeCheckboxes[data.type]) {
				const checkboxInput = document.createElement("input");
				checkboxInput.type = "checkbox";
				checkboxInput.name = data.type;
				checkboxInput.checked = true;
				checkboxInput.addEventListener("change", renderProductList);

				typeCheckboxes[data.type] = checkboxInput;

				const label = document.createElement("label");
				label.for = data.type;
				label.textContent = data.type;

				typeFilter.appendChild(checkboxInput);
				typeFilter.appendChild(label);
				typeFilter.appendChild(document.createElement("br"));
			}
		}

		renderProductList();
	</script>
</body>

</html>
